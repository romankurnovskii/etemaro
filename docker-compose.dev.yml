services:
  etemaro:
    build:
      context: .
      dockerfile: Dockerfile
    image: etemaro:dev
    command: pnpm run dev
    env_file: .env
    volumes:
      - ./packages:/app/packages
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped

networks:
  default:
    name: etemaro-dev
