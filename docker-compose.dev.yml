services:
  meridian:
    build:
      context: .
      dockerfile: Dockerfile
    image: meridian:dev
    command: pnpm run dev
    env_file: .env
    volumes:
      - ./packages:/app/packages
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped

volumes:

networks:
  default:
    name: meridian-dev
